api_version = "2026-04"

[[extensions]]
name = "video-widget"
handle = "video-widget"
type = "ui_extension"
uid = "47bb556f-26ef-3906-cfbb-f09182abe81039985e0f"

[[extensions.targeting]]
module = "./src/Checkout.jsx"
target = "purchase.thank-you.block.render"

[extensions.capabilities]
api_access = true

[extensions.settings]

[[extensions.settings.fields]]
key = "videosEnabled"
type = "boolean"
name = "Enable video widget"
description = "Show shoppable videos on thank you page"

[[extensions.settings.fields]]
key = "widgetHeading"
type = "single_line_text_field"
name = "Widget heading"
description = "Heading above the video section"

[[extensions.settings.fields]]
key = "videoUrls"
type = "single_line_text_field"
name = "Video URLs (JSON)"
description = "JSON array of video URLs to display"

[[extensions.settings.fields]]
key = "primaryColor"
type = "single_line_text_field"
name = "Primary color"
description = "Hex color for UI accents"

[[extensions.settings.fields]]
key = "showProductTags"
type = "boolean"
name = "Show product tags"
description = "Display tagged product info on videos"